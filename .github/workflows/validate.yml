name: Validate Skills

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation dependencies
        run: python3 -m pip install pyyaml jsonschema
      - name: Validate skill structure, installability, and index
        run: python3 scripts/validate-skills.py --summary-file "$GITHUB_STEP_SUMMARY"
