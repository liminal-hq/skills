name: pr-integration
description: Review and integrate pull requests with audit and execute flows, conflict-aware ordering, validation gates, checkpointing, and rollback safeguards.
version: 2.6.0
owners:
  - ScottMorris
supported_agents:
  - codex
  - claude
  - antigravity
  - aider
  - cursor
  - cline
  - gemini-cli
required_files:
  - core/intent.md
  - core/workflow.md
  - core/guardrails.md
  - adapters/codex/CODEX.md
  - adapters/claude/CLAUDE.md
  - adapters/antigravity/ANTIGRAVITY.md
  - adapters/aider/AIDER.md
  - adapters/cursor/CURSOR.md
  - adapters/cline/CLINE.md
  - adapters/gemini-cli/GEMINI_CLI.md
  - references/action-plan-template.md
  - references/checkpoint-format.md
  - references/checkpoint.schema.json
  - tests/smoke.md
validation_commands:
  - gh auth status
  - git status --short --branch
  - pnpm test
  - pnpm build
required_tools:
  - gh
  - git
optional_tools:
  - pnpm
  - npm
  - yarn
  - jq
  - rg
artefact_paths:
  - docs/integration-runs/<date>-<batch>-action-plan.md
  - docs/integration-runs/<date>-<batch>-action-plan.json
  - docs/integration-runs/<date>-<batch>-checkpoints.json
  - docs/integration-runs/<date>-<batch>-final-report.md
approval_requirements:
  - explicit approval between audit and execute
  - explicit push approval before remote updates
  - explicit approval for planned force-push operations
  - explicit approval for commit rewrite plan when needed
  - explicit approval for label update plan before merge
  - explicit approval for PR communication and final fate messaging plan
scoring_weights:
  security_fix: 100
  bug_fix: 60
  performance_change: 40
  ux_enhancement: 30
  documentation_only: 10
  failing_ci: -80
  overlap_risk: -20
merge_policy:
  branch_strategy: integration/activity-description
  branch_name_pattern: ^integration/[a-z0-9][a-z0-9-]*$
  rebase_dirty_prs: true
  commit_message_style: conventional-commit-with-body
rollback_policy:
  stop_on_gate_failure: true
  revert_last_integration_commit: true
  regenerate_plan_after_rollback: true
label_policy:
  required_labels:
    - name: changes-requested
      description: Review feedback requested before merge
    - name: manual-follow-up
      description: Needs manual attention outside automated integration workflow
